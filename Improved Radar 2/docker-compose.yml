# ═══════════════════════════════════════════════════════════════════════
# Soloist Opportunity Agent — Docker Compose
# ═══════════════════════════════════════════════════════════════════════

services:
  soloist-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./sqlite_db:/app/sqlite_db
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
